---
- name: Ensure ~/.claude directory exists
  file:
    path: "{{ claude_config_path }}"
    state: directory
    mode: '0755'

- name: Ensure ~/.claude/skills directory exists
  file:
    path: "{{ claude_skills_path }}"
    state: directory
    mode: '0755'

- name: Symlink global CLAUDE.md
  file:
    src: "{{ dotfiles_path }}/ai/claude/CLAUDE.md"
    dest: "{{ claude_config_path }}/CLAUDE.md"
    state: link
    force: true

- name: Symlink claude-init skill
  file:
    src: "{{ dotfiles_path }}/ai/claude/skills/claude-init"
    dest: "{{ claude_skills_path }}/claude-init"
    state: link
    force: true

- name: Symlink write-commits skill
  file:
    src: "{{ dotfiles_path }}/ai/claude/skills/write-commits"
    dest: "{{ claude_skills_path }}/write-commits"
    state: link
    force: true

- name: Symlink create-pr skill
  file:
    src: "{{ dotfiles_path }}/ai/claude/skills/create-pr"
    dest: "{{ claude_skills_path }}/create-pr"
    state: link
    force: true

- name: Symlink update-docs skill
  file:
    src: "{{ dotfiles_path }}/ai/claude/skills/update-docs"
    dest: "{{ claude_skills_path }}/update-docs"
    state: link
    force: true
