---
- name: Tap third-party Homebrew repositories
  homebrew_tap:
    name: "{{ item }}"
    state: present
  loop:
    - hashicorp/tap
    - homebrew/autoupdate

- name: Install Homebrew packages
  homebrew:
    name: "{{ item }}"
    state: present
  loop:
    # Version control & collaboration
    - git
    - gh

    # Languages & runtimes
    - go
    - pyenv

    # Shell
    - bash
    - zsh

    # Editors
    - neovim

    # CLI utilities
    - bat
    - coreutils
    - frpc
    - fzf
    - gnupg
    - jq
    - ripgrep
    - tlrc
    - watch

    # Containers & orchestration
    - dive
    - helm
    - k9s
    - kubescape
    - kubernetes-cli
    - lima

    # Infrastructure & GitOps
    - ansible
    - argocd
    - opentofu
    - hashicorp/tap/vault
    - tailscale

    # AI / ML
    - claude-code
    - llmfit
    - ollama

    # Python tooling
    - uv

    # Static sites
    - hugo

- name: Install Cask packages
  homebrew_cask:
    name: "{{ item }}"
    state: present
    install_options: "force"
  loop:
    # Browsers
    - firefox
    - google-chrome

    # Containers & VMs
    - docker-desktop
    - utm

    # Communication
    - discord
    - slack

    # AI
    - chatgpt
    - claude
    - codex

    # Security & networking
    - bitwarden
    - protonvpn

    # Fonts
    - font-atkinson-hyperlegible-next
    - font-meslo-lg-nerd-font

    # Utilities
    - rectangle
    - vlc
    - db-browser-for-sqlite

- name: Enable weekly brew autoupdate
  command: brew autoupdate start --upgrade --cleanup 604800
  args:
    creates: ~/Library/LaunchAgents/com.github.domt4.homebrew-autoupdate.plist
